# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$os\
$hostname\
$username\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$c\
$cpp\
$rust\
$python\
$character"""

[os]
disabled = false
format = "[   ]($style)"
style = "bold blue"

[hostname]
format = "[$hostname]($style) "
style = "bold white"


[username]
format = '[$user]($style) '
disabled = false
show_always = true
style_root = 'red bold'

[directory]
truncation_length = 3
format = "[$path]($style)[$read_only]($read_only_style)($style) "
style = "blue"

[git_branch]
format = "[$symbol$branch]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'

[c]
format = "[$symbol($version(-$name))]($style) "

[cpp]
format = "[$symbol($version)]($style) "

[rust]
format = "[$symbol($version)]($style) "

[python]
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '

[sudo]
format = "[$symbol]($style)"
symbol = "󰡗 "
style = "yellow"
disabled = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
